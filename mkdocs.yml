site_name: LLM Evaluation Framework
site_url: https://a217-anjali.github.io/llm-evaluation-framework/
site_description: >-
  The definitive open-source guide to evaluating Large Language Models —
  theory, benchmarks, tooling, hands-on labs, and production patterns.
site_author: LLM Eval Framework Contributors
repo_url: https://github.com/a217-anjali/llm-evaluation-framework
repo_name: llm-evaluation-framework
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 LLM Eval Framework Contributors — Apache 2.0

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      toc_depth: 3

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/a217-anjali/llm-evaluation-framework
  generator: false

nav:
  - Home: index.md
  - Foundations:
    - 01-foundations/why-evaluation-matters.md
    - 01-foundations/taxonomy-of-evaluations.md
    - 01-foundations/metrics-deep-dive.md
    - 01-foundations/statistical-rigor.md
  - Benchmarks:
